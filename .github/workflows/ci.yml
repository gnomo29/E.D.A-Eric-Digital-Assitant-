name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap CLI dry-run parse check
        run: python tools/bootstrap_v3.py --dry-run --no-tests

      - name: Operate Secure dry-run parse check
        run: python tools/operate_secure.py --dry-run --no-tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

